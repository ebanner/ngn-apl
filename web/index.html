<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<title>apl</title>
<style>
@font-face{font-family:a;src:url(Apl385.woff)format('woff');}
body,textarea{font-family:a,monospace}
#code{width:100%}
#rslt{white-space:pre}
#rslt.err{color:red}
</style>
</head>
<body>
<textarea id=code rows=8 autofocus></textarea>
<input type=submit value=⍎ onclick="run()">
<div id=rslt></div>
<script src=../apl.js></script>
<script>
const abbrevs = {
  /* First Row */
  "diamond": "⋄",
  "each": "¨",
  "minus": "¯",
  "gradedown": "⍒",
  "leq": "≤",
  "gradeup": "⍋",
  "reverse": "⌽",
  "reversal": "⌽",
  "geq": "≥",
  "transpose": "⍉",
  "ne": "≠",
  "or": "∨",
  "and": "∧",
  "times": "×",
  "signum": "×",
  "div": "÷",

  /* Top Row */
  "omega": "⍵",
  "epsilon": "∊",
  "enlist": "∊",
  "contains": "∊",
  "find": "⍷",
  "rho": "⍴",
  "tile": "⍴",
  "reshape": "⍴",
  "shape": "⍴",
  "commute": "⍨",
  "selfie": "⍨",
  "reflex": "⍨",
  "up": "↑",
  "mix": "↑",
  "take": "↑",
  "iota": "⍳",
  "where": "⍸",
  "power": "⍣",
  "gets": "←",
  "quotequad": "⍞",
  "qq": "⍞",
  "righttack": "⊢",

  /* Home Row */
  "alpha": "⍺",
  "ceil": "⌈",
  "floor": "⌊",
  "jot": "∘",
  "compose": "∘",
  "bind": "∘",
  "rank": "⍤",
  "quad": "⎕",
  "squad": "⌷",
  "execute": "⍎",
  "hydrant": "⍎",
  "match": "≡",
  "depth": "≡",
  "format": "⍕",
  "tally": "≢",

  /* Bottom Row */
  "enclose": "⊂",
  "pick": "⊃",
  "first": "⊃",
  "disclose": "⊃",
  "unique": "∪",
  "decode": "⊥",
  "lantern": "⍝",
  "lamp": "⍝",
  "cove": "⍪",
  "table": "⍪",
  "slashbar": "⌿",
  "partition": "⊆",
}
 
document.getElementById('code').addEventListener('keydown', function(e) {
  if (e.key === ' ' || e.key === 'Enter') {
    const el = this
    const pos = el.selectionStart
    const text = el.value.slice(0, pos)
    const word = text.split(/\s/).pop()
    if (abbrevs[word]) {
      e.preventDefault()
      const replacement = abbrevs[word] + (e.key === 'Enter' ? '\n' : ' ')
      el.value = el.value.slice(0, pos - word.length) + replacement + el.value.slice(pos)
      el.selectionStart = el.selectionEnd = pos - word.length + replacement.length
    }
  }
})
 
function run(){
  var r=document.getElementById('rslt')
  r.className=''
  try{r.textContent=apl.fmt(apl(document.getElementById('code').value)).join('\n')+'\n'}
  catch(e){r.className='err';r.textContent=e}
}
</script>
</body>
</html>
